# [비활성화] Fly.io 배포 — Lightsail 통합으로 더 이상 사용하지 않음
# 2026-03-13: Bridge API를 Lightsail Tokyo에 통합, Fly.io 제거

name: Deploy Bridge API to Fly.io (DISABLED)

on:
  workflow_dispatch:  # 수동 실행만 허용 (자동 트리거 제거)

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: false  # 비활성화

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: bridge-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
