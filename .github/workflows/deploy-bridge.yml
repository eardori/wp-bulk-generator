name: Deploy Bridge API + EC2 Agent

on:
  push:
    branches: [main]
    paths:
      - 'bridge-api/**'
      - '.github/workflows/deploy-bridge.yml'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Pull & build
        run: |
          ssh deploy-server << 'ENDSSH'
            cd /home/ubuntu/wp-bulk-generator
            git fetch origin main
            git reset --hard origin/main
            cd bridge-api
            npm ci --production
            npm run build
          ENDSSH

      - name: Restart services
        run: |
          ssh deploy-server << 'ENDSSH'
            # EC2 Agent (localhost only, 파일시스템 접근)
            pm2 delete ec2-agent 2>/dev/null || true
            pm2 start /home/ubuntu/wp-bulk-generator/bridge-api/dist/ec2-agent.js \
              --name ec2-agent \
              --cwd /home/ubuntu/wp-bulk-generator/bridge-api \
              --max-memory-restart 100M

            # Bridge API (외부 접근, Playwright + AI 생성)
            pm2 delete wp-bridge-api 2>/dev/null || true
            pm2 start /home/ubuntu/wp-bulk-generator/bridge-api/dist/server.js \
              --name wp-bridge-api \
              --cwd /home/ubuntu/wp-bulk-generator/bridge-api \
              --max-memory-restart 250M

            pm2 save
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          ssh deploy-server << 'ENDSSH'
            echo "--- EC2 Agent ---"
            curl -sf http://localhost:4001/health && echo ' OK' || echo ' FAIL'
            echo "--- Bridge API ---"
            curl -sf http://localhost:4000/health && echo ' OK' || echo ' FAIL'
          ENDSSH
