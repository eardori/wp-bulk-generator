name: Deploy Bridge API

on:
  push:
    branches: [main]
    paths:
      - 'bridge-api/**'
      - '.github/workflows/deploy-bridge.yml'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bridge API to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Pull & build Bridge API
        run: |
          ssh deploy-server << 'ENDSSH'
            cd /home/ubuntu/wp-bulk-generator
            git fetch origin main
            git reset --hard origin/main
            cd bridge-api
            npm ci --production
            npm run build
          ENDSSH

      - name: Restart Bridge API
        run: |
          ssh deploy-server << 'ENDSSH'
            pm2 restart wp-bridge-api || pm2 start /home/ubuntu/wp-bulk-generator/bridge-api/dist/server.js --name wp-bridge-api --max-memory-restart 200M
            pm2 save
          ENDSSH

      - name: Health check
        run: |
          sleep 3
          ssh deploy-server "curl -sf http://localhost:4000/health > /dev/null && echo 'Bridge API health check passed' || echo 'Bridge API health check failed'"
