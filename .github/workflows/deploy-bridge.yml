name: Deploy EC2 Agent

on:
  push:
    branches: [main]
    paths:
      - 'bridge-api/**'
      - '.github/workflows/deploy-bridge.yml'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy EC2 Agent to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Pull & build EC2 Agent
        run: |
          ssh deploy-server << 'ENDSSH'
            cd /home/ubuntu/wp-bulk-generator
            git fetch origin main
            git reset --hard origin/main
            cd bridge-api
            npm ci --production
            npm run build
          ENDSSH

      - name: Restart EC2 Agent
        run: |
          ssh deploy-server << 'ENDSSH'
            pm2 delete wp-bridge-api 2>/dev/null || true
            pm2 restart ec2-agent || pm2 start /home/ubuntu/wp-bulk-generator/bridge-api/dist/ec2-agent.js --name ec2-agent --max-memory-restart 100M
            pm2 save
          ENDSSH

      - name: Health check
        run: |
          sleep 3
          ssh deploy-server "curl -sf http://localhost:4001/health > /dev/null && echo 'EC2 Agent health check passed' || echo 'EC2 Agent health check failed'"
